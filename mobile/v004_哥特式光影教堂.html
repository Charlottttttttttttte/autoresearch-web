<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>哥特式光影教堂 — 神圣之光</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050508;
  overflow: hidden;
  overflow-x: hidden;
  font-family: 'Cinzel', serif;
  color: #e0d5c5;
  touch-action: none;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
.overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.title {
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  width: 90%;
}
.title h1 {
  font-size: 1.8rem;
  font-weight: 400;
  letter-spacing: 0.3em;
  color: rgba(224,213,197,0.85);
  text-shadow: 0 0 40px rgba(212,175,55,0.15);
  opacity: 0;
  animation: divineReveal 2s ease 1s forwards;
}
.title .subtitle {
  font-size: 14px;
  color: rgba(224,213,197,0.3);
  margin-top: 10px;
  letter-spacing: 0.3em;
  opacity: 0;
  animation: divineReveal 2s ease 1.8s forwards;
}
@keyframes divineReveal {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.info {
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.info span {
  display: block;
  font-size: 12px;
  color: rgba(224,213,197,0.15);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="overlay title">
  <h1>LUX AETERNA</h1>
  <div class="subtitle">永恒之光</div>
</div>
<div class="overlay info">
  <span>触摸改变光束角度</span>
  <span>点击召唤神圣光辉</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050508, 0.01);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 28);

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setClearColor(0x050508, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0x1a1530, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffddaa, 0.7);
sunLight.position.set(10, 20, 10);
scene.add(sunLight);

const stainedColors = [0xff3333, 0xff8800, 0xffdd00, 0x33ff66, 0x3388ff, 0x8833ff];
const windowLights = [];
for (let i = 0; i < 4; i++) {
  const light = new THREE.PointLight(stainedColors[i], 0.35, 35);
  light.position.set(-9 + i * 6, 8, -5);
  scene.add(light);
  windowLights.push(light);
}

const groundLight = new THREE.PointLight(0xffddaa, 0.25, 25);
groundLight.position.set(0, -5, 5);
scene.add(groundLight);

const cathedralGroup = new THREE.Group();
scene.add(cathedralGroup);

const floorGeometry = new THREE.PlaneGeometry(60, 80, 10, 10);
const floorMaterial = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e, metalness: 0.1, roughness: 0.9, transparent: true, opacity: 0.7
});
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -8;
cathedralGroup.add(floor);

function createColumn(x, z, height) {
  const geometry = new THREE.CylinderGeometry(0.6, 0.8, height, 6);
  const material = new THREE.MeshStandardMaterial({ color: 0x2a2538, metalness: 0.3, roughness: 0.7 });
  const column = new THREE.Mesh(geometry, material);
  column.position.set(x, -8 + height/2, z);
  const capGeometry = new THREE.ConeGeometry(1.0, 1.5, 6);
  const cap = new THREE.Mesh(capGeometry, material);
  cap.position.set(x, -8 + height + 0.75, z);
  cathedralGroup.add(cap);
  return column;
}

for (let i = -1; i <= 1; i++) {
  cathedralGroup.add(createColumn(i * 8, -10, 18));
  cathedralGroup.add(createColumn(i * 8, 5, 18));
}

function createArch(x, z, width, height) {
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-width/2, 0, 0),
    new THREE.Vector3(-width/3, height * 0.7, 0),
    new THREE.Vector3(0, height, 0),
    new THREE.Vector3(width/3, height * 0.7, 0),
    new THREE.Vector3(width/2, 0, 0)
  ]);
  const geometry = new THREE.TubeGeometry(curve, 16, 0.4, 4, false);
  const material = new THREE.MeshStandardMaterial({ color: 0x3a3548, metalness: 0.4, roughness: 0.6 });
  const arch = new THREE.Mesh(geometry, material);
  arch.position.set(x, 10, z);
  return arch;
}

for (let i = -1; i < 1; i++) {
  cathedralGroup.add(createArch(i * 8 + 4, -10, 8, 6));
  cathedralGroup.add(createArch(i * 8 + 4, 5, 8, 6));
}

function createStainedGlass(x, y, z, color, size) {
  const group = new THREE.Group();
  const frameGeometry = new THREE.RingGeometry(size * 0.9, size, 12);
  const frameMaterial = new THREE.MeshStandardMaterial({ color: 0x4a4560, metalness: 0.5, roughness: 0.5, side: THREE.DoubleSide });
  group.add(new THREE.Mesh(frameGeometry, frameMaterial));
  
  const glassGeometry = new THREE.CircleGeometry(size * 0.85, 12);
  const glassMaterial = new THREE.MeshStandardMaterial({
    color: color, transparent: true, opacity: 0.45, emissive: color, emissiveIntensity: 0.25,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Mesh(glassGeometry, glassMaterial));
  
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const lineGeometry = new THREE.BoxGeometry(0.05, size, 0.05);
    const line = new THREE.Mesh(lineGeometry, frameMaterial);
    line.position.x = Math.cos(angle) * size * 0.4;
    line.position.y = Math.sin(angle) * size * 0.4;
    line.rotation.z = angle;
    group.add(line);
  }
  group.position.set(x, y, z);
  return group;
}

const glassPositions = [
  { x: -9, y: 5, color: 0xff3333, size: 2.5 },
  { x: -3, y: 6, color: 0xffdd00, size: 2 },
  { x: 3, y: 6, color: 0x33ff66, size: 2 },
  { x: 9, y: 5, color: 0x3388ff, size: 2.5 }
];

glassPositions.forEach(gp => {
  cathedralGroup.add(createStainedGlass(gp.x, gp.y, -12, gp.color, gp.size));
});

const rayCount = 150;
const rayGeometry = new THREE.BufferGeometry();
const rayPositions = new Float32Array(rayCount * 3);
const rayColors = new Float32Array(rayCount * 3);

for (let i = 0; i < rayCount; i++) {
  const windowIdx = Math.floor(Math.random() * glassPositions.length);
  const gp = glassPositions[windowIdx];
  rayPositions[i*3] = gp.x + (Math.random() - 0.5) * 2;
  rayPositions[i*3+1] = gp.y - Math.random() * 15;
  rayPositions[i*3+2] = gp.z + Math.random() * 20;
  const color = new THREE.Color(gp.color);
  rayColors[i*3] = color.r; rayColors[i*3+1] = color.g; rayColors[i*3+2] = color.b;
}

rayGeometry.setAttribute('position', new THREE.BufferAttribute(rayPositions, 3));
rayGeometry.setAttribute('color', new THREE.BufferAttribute(rayColors, 3));

const rayMaterial = new THREE.PointsMaterial({
  size: 0.3, vertexColors: true, transparent: true, opacity: 0.35,
  blending: THREE.AdditiveBlending, sizeAttenuation: true
});
const godRays = new THREE.Points(rayGeometry, rayMaterial);
scene.add(godRays);

const dustCount = 100;
const dustGeometry = new THREE.BufferGeometry();
const dustPositions = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPositions[i*3] = (Math.random() - 0.5) * 35;
  dustPositions[i*3+1] = -8 + Math.random() * 18;
  dustPositions[i*3+2] = (Math.random() - 0.5) * 25;
}
dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMaterial = new THREE.PointsMaterial({
  color: 0xffddaa, size: 0.12, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending
});
const dust = new THREE.Points(dustGeometry, dustMaterial);
scene.add(dust);

const touch = new THREE.Vector2();
let isPraying = false;
let prayTime = 0;

window.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touch.x = (t.clientX / window.innerWidth) * 2 - 1;
  touch.y = -(t.clientY / window.innerHeight) * 2 + 1;
  isPraying = true;
  prayTime = 0;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  touch.x = (t.clientX / window.innerWidth) * 2 - 1;
  touch.y = -(t.clientY / window.innerHeight) * 2 + 1;
  sunLight.position.x = 10 + touch.x * 5;
  sunLight.position.y = 20 + touch.y * 5;
}, { passive: true });

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  windowLights.forEach((light, i) => {
    light.intensity = 0.25 + Math.sin(time * 0.5 + i * 1.2) * 0.15;
  });

  const rPos = godRays.geometry.attributes.position.array;
  for (let i = 0; i < rayCount; i++) {
    rPos[i*3+1] -= 0.015;
    rPos[i*3] += Math.sin(time + i * 0.1) * 0.003;
    if (rPos[i*3+1] < -8) {
      const windowIdx = Math.floor(Math.random() * glassPositions.length);
      const gp = glassPositions[windowIdx];
      rPos[i*3] = gp.x + (Math.random() - 0.5) * 2;
      rPos[i*3+1] = gp.y;
      rPos[i*3+2] = gp.z;
    }
  }
  godRays.geometry.attributes.position.needsUpdate = true;

  const dPos = dust.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    dPos[i*3+1] += Math.sin(time * 0.3 + i * 0.05) * 0.002;
    dPos[i*3] += Math.cos(time * 0.2 + i * 0.03) * 0.001;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  camera.position.x = Math.sin(time * 0.1) * 2;
  camera.position.y = 2 + Math.sin(time * 0.15) * 0.5;
  camera.lookAt(0, 2, 0);

  if (isPraying) {
    prayTime += delta;
    const prayFactor = Math.sin(prayTime * 2) * 0.5 + 0.5;
    sunLight.intensity = 0.7 + prayFactor * 1.5;
    godRays.material.opacity = 0.35 + prayFactor * 0.35;
    godRays.material.size = 0.3 + prayFactor * 0.4;
    windowLights.forEach(l => { l.intensity = 0.4 + prayFactor; });
    if (prayTime > 3) isPraying = false;
  } else {
    sunLight.intensity = 0.7 + Math.sin(time * 0.3) * 0.1;
    godRays.material.opacity = 0.35;
    godRays.material.size = 0.3;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
