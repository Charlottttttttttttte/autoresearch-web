<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏆 AutoResearch TOP5</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff;
  min-height: 100vh;
  padding: 24px 16px;
}
.header {
  text-align: center;
  margin-bottom: 32px;
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 300;
  background: linear-gradient(135deg, #d4af37, #f4e4c1, #4ecdc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.1em;
}
.header p {
  color: rgba(255,255,255,0.3);
  font-size: 0.85rem;
  margin-top: 8px;
}
.stats {
  display: flex;
  justify-content: space-around;
  margin-bottom: 24px;
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
}
.stat-item {
  text-align: center;
}
.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: #d4af37;
}
.stat-label {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.card {
  background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(78,205,196,0.04));
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(180deg, #d4af37, #4ecdc4);
}
.rank {
  font-size: 2rem;
  font-weight: 700;
  color: #d4af37;
  opacity: 0.6;
  position: absolute;
  top: 12px; right: 16px;
}
.card-title {
  font-size: 1.1rem;
  font-weight: 500;
  color: #f4e4c1;
  margin-bottom: 4px;
}
.card-meta {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.35);
  margin-bottom: 12px;
}
.card-score {
  display: inline-block;
  background: rgba(212,175,55,0.15);
  color: #d4af37;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
}
.card-btn {
  display: inline-block;
  margin-left: 12px;
  background: linear-gradient(135deg, #d4af37, #c9a227);
  color: #0a0a0a;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="header">
  <h1>🏆 AutoResearch</h1>
  <p>24小时自动设计实验 · TOP5 作品展示</p>
</div>
<div class="stats">

  <div class="stat-item"><div class="stat-value">6</div><div class="stat-label">通过</div></div>
  <div class="stat-item"><div class="stat-value">8.5</div><div class="stat-label">最高分</div></div>
</div>

<div class="card">
  <div class="rank">#1</div>
  <div class="card-title">解构主义破碎</div>

  <span class="card-score">⭐ 8.5分</span>

</div>

</div>

<div class="card">
  <div class="rank">#3</div>
  <div class="card-title">哥特式光影教堂</div>
  <div class="card-meta">Round #4 · Mutation-Motion</div>
  <span class="card-score">⭐ 8.3分</span>
  <a href="v004_哥特式光影教堂.html" class="card-btn">查看</a>
</div>

  <a href="v006_电路板城市.html" class="card-btn">查看</a>
</div>

</body>
</html>
