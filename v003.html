<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水墨动态书法 — 气韵生动</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Noto Serif SC', serif;
  color: #e8e8e8;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
.overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.title {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.title h1 {
  font-size: 5rem;
  font-weight: 300;
  letter-spacing: 0.5em;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 80px rgba(255,255,255,0.1);
  opacity: 0;
  animation: inkReveal 3s ease 1s forwards;
}
.title .subtitle {
  font-size: 1rem;
  color: rgba(255,255,255,0.3);
  margin-top: 24px;
  letter-spacing: 0.8em;
  opacity: 0;
  animation: inkReveal 3s ease 2s forwards;
}
@keyframes inkReveal {
  0% { opacity: 0; filter: blur(20px); transform: scale(1.1); }
  100% { opacity: 1; filter: blur(0px); transform: scale(1); }
}
.info {
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.info span {
  display: block;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}
.seal {
  position: fixed;
  bottom: 8%;
  right: 8%;
  width: 60px;
  height: 60px;
  border: 2px solid rgba(180,40,40,0.6);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: rgba(180,40,40,0.7);
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  animation: inkReveal 2s ease 3s forwards;
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="overlay title">
  <h1>气韵</h1>
  <div class="subtitle">墨舞云端</div>
</div>
<div class="overlay info">
  <span>拖动鼠标书写墨迹</span>
  <span>点击晕染扩散</span>
</div>
<div class="seal">墨</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === 水墨动态书法 Three.js 场景 ===
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0a, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// === 水墨着色器材质 ===
const inkVertexShader = `
  varying vec2 vUv;
  varying float vAlpha;
  attribute float alpha;
  attribute float size;
  void main() {
    vUv = uv;
    vAlpha = alpha;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = size * (300.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const inkFragmentShader = `
  varying vec2 vUv;
  varying float vAlpha;
  uniform float uTime;
  uniform float uSpread;
  
  float noise(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }
  
  void main() {
    float dist = length(vUv - vec2(0.5));
    float inkEdge = smoothstep(0.5, 0.2, dist);
    float noiseVal = noise(vUv * 10.0 + uTime * 0.1) * 0.3;
    float spreadFactor = 1.0 - uSpread * 0.3;
    float alpha = inkEdge * vAlpha * (0.7 + noiseVal) * spreadFactor;
    
    // 水墨灰度层次
    float gray = 0.1 + noiseVal * 0.4;
    vec3 color = vec3(gray);
    
    gl_FragColor = vec4(color, alpha);
  }
`;

// === 墨迹笔触系统 ===
const maxStrokes = 800;
const strokeGeometry = new THREE.BufferGeometry();
const strokePositions = new Float32Array(maxStrokes * 3);
const strokeAlphas = new Float32Array(maxStrokes);
const strokeSizes = new Float32Array(maxStrokes);
const strokeAges = new Float32Array(maxStrokes);

for (let i = 0; i < maxStrokes; i++) {
  strokePositions[i*3] = 0;
  strokePositions[i*3+1] = 0;
  strokePositions[i*3+2] = 0;
  strokeAlphas[i] = 0;
  strokeSizes[i] = 0;
  strokeAges[i] = 0;
}

strokeGeometry.setAttribute('position', new THREE.BufferAttribute(strokePositions, 3));
strokeGeometry.setAttribute('alpha', new THREE.BufferAttribute(strokeAlphas, 1));
strokeGeometry.setAttribute('size', new THREE.BufferAttribute(strokeSizes, 1));

const inkMaterial = new THREE.ShaderMaterial({
  vertexShader: inkVertexShader,
  fragmentShader: inkFragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uSpread: { value: 0 }
  },
  transparent: true,
  blending: THREE.NormalBlending,
  depthWrite: false
});

const strokePoints = new THREE.Points(strokeGeometry, inkMaterial);
scene.add(strokePoints);

let strokeIndex = 0;
let isDrawing = false;

function addInkPoint(x, y, size, alpha) {
  strokePositions[strokeIndex*3] = x;
  strokePositions[strokeIndex*3+1] = y;
  strokePositions[strokeIndex*3+2] = 0;
  strokeAlphas[strokeIndex] = alpha;
  strokeSizes[strokeIndex] = size;
  strokeAges[strokeIndex] = 0;
  strokeIndex = (strokeIndex + 1) % maxStrokes;
}

// === 背景水墨晕染纹理 ===
const bgGeometry = new THREE.PlaneGeometry(100, 80, 32, 32);
const bgMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0, 0) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec2 uMouse;
    varying vec2 vUv;
    
    float fbm(vec2 p) {
      float sum = 0.0;
      float amp = 1.0;
      float freq = 1.0;
      for(int i = 0; i < 5; i++) {
        sum += amp * sin(p.x * freq + uTime * 0.1) * cos(p.y * freq + uTime * 0.15);
        amp *= 0.5;
        freq *= 2.0;
      }
      return sum;
    }
    
    void main() {
      vec2 uv = vUv;
      float n = fbm(uv * 3.0 + uTime * 0.05);
      float n2 = fbm(uv * 5.0 - uTime * 0.03);
      
      // 水墨纹理
      float ink = smoothstep(-0.3, 0.5, n) * 0.15;
      float ink2 = smoothstep(-0.2, 0.6, n2) * 0.08;
      
      // 鼠标附近的晕染
      float mouseDist = length(uv - uMouse);
      float mouseInk = smoothstep(0.5, 0.0, mouseDist) * 0.1;
      
      float gray = 0.04 + ink + ink2 + mouseInk;
      
      gl_FragColor = vec4(vec3(gray), 1.0);
    }
  `,
  transparent: false
});

const bgPlane = new THREE.Mesh(bgGeometry, bgMaterial);
bgPlane.position.z = -10;
scene.add(bgPlane);

// === 毛笔笔触3D线条 ===
const brushGroup = new THREE.Group();
scene.add(brushGroup);

function createBrushStroke(points) {
  if (points.length < 2) return;
  const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p.x, p.y, p.z)));
  const geometry = new THREE.TubeGeometry(curve, Math.min(points.length * 2, 50), 0.3, 6, false);
  const material = new THREE.MeshBasicMaterial({
    color: 0x222222,
    transparent: true,
    opacity: 0.6
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.userData = { birth: Date.now(), life: 3000 };
  brushGroup.add(mesh);
}

// === 鼠标/触摸交互 ===
const mouse = new THREE.Vector2(-100, -100);
const worldMouse = new THREE.Vector3();
let brushPoints = [];
let lastPoint = null;

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  
  worldMouse.set(mouse.x * 40, mouse.y * 30, 0);
  
  if (isDrawing) {
    const dist = lastPoint ? worldMouse.distanceTo(lastPoint) : 100;
    if (dist > 0.5) {
      const pressure = Math.max(0.3, Math.min(1.0, 20 / (dist + 1)));
      const size = 2 + pressure * 6;
      addInkPoint(worldMouse.x, worldMouse.y, size, pressure * 0.8);
      brushPoints.push(worldMouse.clone());
      if (brushPoints.length > 20) {
        createBrushStroke(brushPoints);
        brushPoints = [brushPoints[brushPoints.length - 1]];
      }
      lastPoint = worldMouse.clone();
    }
  }
  
  bgMaterial.uniforms.uMouse.value.set(e.clientX / window.innerWidth, 1 - e.clientY / window.innerHeight);
});

window.addEventListener('mousedown', () => {
  isDrawing = true;
  lastPoint = null;
  brushPoints = [];
});

window.addEventListener('mouseup', () => {
  isDrawing = false;
  if (brushPoints.length > 1) {
    createBrushStroke(brushPoints);
  }
  brushPoints = [];
});

window.addEventListener('click', (e) => {
  // 点击晕染扩散
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 8;
    addInkPoint(
      worldMouse.x + Math.cos(angle) * dist,
      worldMouse.y + Math.sin(angle) * dist,
      3 + Math.random() * 8,
      0.3 + Math.random() * 0.4
    );
  }
  inkMaterial.uniforms.uSpread.value = 1.0;
  setTimeout(() => { inkMaterial.uniforms.uSpread.value = 0; }, 1000);
});

// === 预设书法笔画（装饰）===
const decorGroup = new THREE.Group();
scene.add(decorGroup);

// 创建几条装饰性墨迹流动线
for (let i = 0; i < 5; i++) {
  const points = [];
  const startX = -30 + Math.random() * 60;
  const startY = -20 + Math.random() * 40;
  for (let j = 0; j < 10; j++) {
    points.push(new THREE.Vector3(
      startX + j * 2 + Math.sin(j * 0.5) * 5,
      startY + j * 3 + Math.cos(j * 0.3) * 3,
      (Math.random() - 0.5) * 2
    ));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const geometry = new THREE.TubeGeometry(curve, 30, 0.1 + Math.random() * 0.3, 6, false);
  const material = new THREE.MeshBasicMaterial({
    color: 0x1a1a1a,
    transparent: true,
    opacity: 0.15 + Math.random() * 0.2
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.userData = { phase: Math.random() * Math.PI * 2, speed: 0.2 + Math.random() * 0.3 };
  decorGroup.add(mesh);
}

// === 动画循环 ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  
  inkMaterial.uniforms.uTime.value = time;
  bgMaterial.uniforms.uTime.value = time;
  
  // 更新笔触年龄
  for (let i = 0; i < maxStrokes; i++) {
    if (strokeAlphas[i] > 0) {
      strokeAges[i] += 0.016;
      const age = strokeAges[i];
      if (age < 2.0) {
        strokeAlphas[i] = Math.min(0.8, strokeAlphas[i] + 0.02);
      } else if (age > 5.0) {
        strokeAlphas[i] *= 0.995;
      }
    }
  }
  strokeGeometry.attributes.alpha.needsUpdate = true;
  
  // 背景装饰线呼吸
  decorGroup.children.forEach(child => {
    child.material.opacity = 0.1 + Math.sin(time * child.userData.speed + child.userData.phase) * 0.08;
    child.rotation.z = Math.sin(time * 0.1 + child.userData.phase) * 0.02;
  });
  
  // 清理旧笔触
  brushGroup.children.forEach((child, i) => {
    const age = Date.now() - child.userData.birth;
    if (age > child.userData.life) {
      child.material.opacity *= 0.98;
      if (child.material.opacity < 0.01) {
        brushGroup.remove(child);
      }
    }
  });
  
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
