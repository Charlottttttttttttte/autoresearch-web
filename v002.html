<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>维也纳分离派 — 金色花语</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Playfair Display', 'Georgia', serif;
  color: #d4af37;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
.overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.title {
  top: 10%;
  left: 8%;
}
.title h1 {
  font-size: 4rem;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.05em;
  color: #d4af37;
  text-shadow: 0 0 60px rgba(212,175,55,0.3), 0 2px 10px rgba(0,0,0,0.8);
  opacity: 0;
  animation: fadeInUp 1.5s ease 0.5s forwards;
}
.title .subtitle {
  font-size: 1.1rem;
  color: rgba(212,175,55,0.5);
  margin-top: 16px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeInUp 1.5s ease 0.8s forwards;
}
.title .divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, #d4af37, transparent);
  margin-top: 20px;
  opacity: 0;
  animation: fadeInUp 1.5s ease 1s forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.info {
  bottom: 8%;
  right: 8%;
  text-align: right;
}
.info span {
  display: block;
  font-size: 0.8rem;
  color: rgba(212,175,55,0.3);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.corner-decor {
  position: fixed;
  width: 120px;
  height: 120px;
  z-index: 10;
  pointer-events: none;
}
.corner-decor.top-left {
  top: 30px; left: 30px;
  border-top: 1px solid rgba(212,175,55,0.2);
  border-left: 1px solid rgba(212,175,55,0.2);
}
.corner-decor.bottom-right {
  bottom: 30px; right: 30px;
  border-bottom: 1px solid rgba(212,175,55,0.2);
  border-right: 1px solid rgba(212,175,55,0.2);
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="corner-decor top-left"></div>
<div class="corner-decor bottom-right"></div>
<div class="overlay title">
  <h1>Wiener Secession</h1>
  <div class="subtitle">维也纳分离派 · 1897</div>
  <div class="divider"></div>
</div>
<div class="overlay info">
  <span>移动鼠标唤醒花卉</span>
  <span>点击绽放金色光芒</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === 维也纳分离派 Three.js 场景 ===
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 35);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0a, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// === 光源 ===
const ambientLight = new THREE.AmbientLight(0x2a1a0a, 0.4);
scene.add(ambientLight);

const goldLight = new THREE.PointLight(0xd4af37, 1.2, 100);
goldLight.position.set(10, 10, 15);
scene.add(goldLight);

const warmLight = new THREE.PointLight(0xff8844, 0.6, 80);
warmLight.position.set(-10, -5, 10);
scene.add(warmLight);

const backLight = new THREE.PointLight(0x4466aa, 0.4, 60);
backLight.position.set(0, 0, -10);
scene.add(backLight);

// === 金色花卉曲线系统 ===
const flowerGroup = new THREE.Group();
scene.add(flowerGroup);

function createFlowerCurve(points, color, thickness, opacity) {
  const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p[0], p[1], p[2])));
  const geometry = new THREE.TubeGeometry(curve, 64, thickness, 8, false);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    metalness: 0.8,
    roughness: 0.2,
    emissive: color,
    emissiveIntensity: 0.15,
    transparent: true,
    opacity: opacity
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.userData = { curve: curve, basePoints: points, phase: Math.random() * Math.PI * 2 };
  return mesh;
}

function createPetalShape(x, y, z, scale, rotation, color) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.bezierCurveTo(0.5, 0.3, 0.8, 1.2, 0, 2);
  shape.bezierCurveTo(-0.8, 1.2, -0.5, 0.3, 0, 0);
  
  const geometry = new THREE.ShapeGeometry(shape, 12);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    metalness: 0.6,
    roughness: 0.3,
    emissive: color,
    emissiveIntensity: 0.1,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.85
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(x, y, z);
  mesh.scale.set(scale, scale, scale);
  mesh.rotation.z = rotation;
  mesh.userData = { baseScale: scale, phase: Math.random() * Math.PI * 2 };
  return mesh;
}

// 创建藤蔓主茎
const vines = [
  { points: [[0,-12,0], [1,-8,1], [-1,-4,-1], [2,0,2], [0,5,0], [-1,10,-1]], color: 0xc9a227, thick: 0.12 },
  { points: [[0,-12,0], [-2,-7,-1], [1,-3,1], [-1,2,-2], [2,8,1]], color: 0xb8941f, thick: 0.08 },
  { points: [[0,-12,0], [2,-6,2], [0,0,-1], [-2,6,2], [1,11,0]], color: 0xd4af37, thick: 0.06 },
];

vines.forEach(v => {
  const vine = createFlowerCurve(v.points, v.color, v.thick, 0.9);
  flowerGroup.add(vine);
});

// 创建花瓣
const petalColors = [0xf4e4c1, 0xe8d5a3, 0xd4af37, 0xc9a227, 0xffeebb, 0xf0d878];
for (let i = 0; i < 18; i++) {
  const angle = (i / 18) * Math.PI * 2;
  const radius = 3 + Math.random() * 4;
  const x = Math.cos(angle) * radius;
  const y = Math.sin(angle) * radius * 0.6 + 2;
  const z = (Math.random() - 0.5) * 3;
  const scale = 0.8 + Math.random() * 1.2;
  const color = petalColors[Math.floor(Math.random() * petalColors.length)];
  const petal = createPetalShape(x, y, z, scale, angle + Math.PI/2, color);
  flowerGroup.add(petal);
}

// 小花朵
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const x = Math.cos(angle) * (6 + Math.random() * 4);
  const y = Math.sin(angle) * (4 + Math.random() * 3) - 2;
  const z = (Math.random() - 0.5) * 4;
  for (let j = 0; j < 5; j++) {
    const pAngle = (j / 5) * Math.PI * 2;
    const px = x + Math.cos(pAngle) * 0.8;
    const py = y + Math.sin(pAngle) * 0.6;
    const pz = z;
    const petal = createPetalShape(px, py, pz, 0.4, pAngle + Math.PI/2, 0xe8d5a3);
    flowerGroup.add(petal);
  }
}

// === 金色粒子系统 ===
const particleCount = 400;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pColor = new Float32Array(particleCount * 3);
const pSize = new Float32Array(particleCount);

const goldPalette = [
  new THREE.Color(0xd4af37),
  new THREE.Color(0xf4e4c1),
  new THREE.Color(0xffeebb),
  new THREE.Color(0xc9a227),
  new THREE.Color(0xe8d5a3)
];

for (let i = 0; i < particleCount; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 40;
  pPos[i*3+1] = (Math.random() - 0.5) * 35;
  pPos[i*3+2] = (Math.random() - 0.5) * 20;
  const c = goldPalette[Math.floor(Math.random() * goldPalette.length)];
  pColor[i*3] = c.r; pColor[i*3+1] = c.g; pColor[i*3+2] = c.b;
  pSize[i] = Math.random() * 2 + 0.3;
}

pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pColor, 3));
pGeo.setAttribute('size', new THREE.BufferAttribute(pSize, 1));

const pMat = new THREE.PointsMaterial({
  size: 0.4,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true
});

const particleSystem = new THREE.Points(pGeo, pMat);
scene.add(particleSystem);

// === 鼠标交互 ===
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
let mouseWorld = new THREE.Vector3();
let isBlooming = false;
let bloomTime = 0;

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  mouseWorld.copy(raycaster.ray.direction).multiplyScalar(20).add(camera.position);
});

window.addEventListener('click', () => {
  isBlooming = true;
  bloomTime = 0;
});

// === 动画 ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  // 藤蔓轻柔摆动
  flowerGroup.children.forEach((child, i) => {
    if (child.userData.curve) {
      child.rotation.z = Math.sin(time * 0.3 + child.userData.phase) * 0.03;
    }
    if (child.userData.baseScale) {
      const breathe = 1 + Math.sin(time * 1.5 + child.userData.phase) * 0.08;
      child.scale.setScalar(child.userData.baseScale * breathe);
    }
  });

  // 整体花卉跟随鼠标轻微倾斜
  flowerGroup.rotation.y += (mouse.x * 0.2 - flowerGroup.rotation.y) * 0.02;
  flowerGroup.rotation.x += (-mouse.y * 0.15 - flowerGroup.rotation.x) * 0.02;

  // 粒子漂浮
  const positions = particleSystem.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i*3+1] += Math.sin(time * 0.5 + i * 0.1) * 0.008;
    positions[i*3] += Math.cos(time * 0.3 + i * 0.05) * 0.003;
  }
  particleSystem.geometry.attributes.position.needsUpdate = true;
  particleSystem.rotation.y = time * 0.03;

  // 绽放效果
  if (isBlooming) {
    bloomTime += delta;
    const bloomFactor = Math.sin(bloomTime * 3) * 0.5 + 0.5;
    flowerGroup.children.forEach(child => {
      if (child.userData.baseScale) {
        child.scale.setScalar(child.userData.baseScale * (1 + bloomFactor * 0.5));
      }
    });
    pMat.size = 0.4 + bloomFactor * 1.0;
    pMat.opacity = 0.7 + bloomFactor * 0.3;
    goldLight.intensity = 1.2 + bloomFactor * 2.0;
    if (bloomTime > 2.5) isBlooming = false;
  } else {
    pMat.size = 0.4;
    pMat.opacity = 0.7;
    goldLight.intensity = 1.2 + Math.sin(time) * 0.2;
  }

  // 光源微妙变化
  goldLight.position.x = 10 + Math.sin(time * 0.5) * 3;
  goldLight.position.y = 10 + Math.cos(time * 0.3) * 2;

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
