<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电路板城市 — 微观秩序</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020408;
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
  color: #33ff66;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
.overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.title {
  top: 8%;
  left: 6%;
}
.title h1 {
  font-size: 2.8rem;
  font-weight: 400;
  letter-spacing: 0.2em;
  color: #33ff66;
  text-shadow: 0 0 30px rgba(51,255,102,0.3);
  opacity: 0;
  animation: bootUp 1s ease 0.5s forwards;
}
.title .subtitle {
  font-size: 0.9rem;
  color: rgba(51,255,102,0.4);
  margin-top: 12px;
  letter-spacing: 0.3em;
  opacity: 0;
  animation: bootUp 1s ease 1s forwards;
}
@keyframes bootUp {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
.data-panel {
  position: fixed;
  top: 8%;
  right: 6%;
  z-index: 10;
  pointer-events: none;
  text-align: right;
}
.data-line {
  font-size: 0.75rem;
  color: rgba(51,255,102,0.3);
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
.data-line span {
  color: rgba(212,175,55,0.6);
}
.info {
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.info span {
  display: block;
  font-size: 0.75rem;
  color: rgba(51,255,102,0.2);
  letter-spacing: 0.15em;
  margin-bottom: 4px;
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="overlay title">
  <h1>PCB_CITY.exe</h1>
  <div class="subtitle">电路板城市 · 微观视角</div>
</div>
<div class="data-panel">
  <div class="data-line">NODES: <span id="node-count">0</span></div>
  <div class="data-line">PACKETS: <span id="packet-count">0</span></div>
  <div class="data-line">FREQ: <span id="freq">0</span> MHz</div>
</div>
<div class="overlay info">
  <span>移动鼠标探索电路板</span>
  <span>点击节点传输数据包</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === 电路板城市 Three.js 场景 ===
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020408, 0.006);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 35, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x020408, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// === 光源 ===
const ambientLight = new THREE.AmbientLight(0x002211, 0.5);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0x33ff66, 0.3);
mainLight.position.set(10, 20, 10);
scene.add(mainLight);

// === 电路板基底 ===
const boardGeo = new THREE.PlaneGeometry(50, 50, 1, 1);
const boardMat = new THREE.MeshStandardMaterial({
  color: 0x0a1a0a,
  metalness: 0.1,
  roughness: 0.9
});
const board = new THREE.Mesh(boardGeo, boardMat);
board.rotation.x = -Math.PI / 2;
board.position.y = -0.5;
scene.add(board);

// 网格线
const gridHelper = new THREE.GridHelper(50, 25, 0x1a3a1a, 0x0f2a0f);
gridHelper.position.y = -0.4;
scene.add(gridHelper);

// === 节点系统 ===
const nodes = [];
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

const nodePositions = [
  [-18,-18], [-10,-18], [-2,-18], [6,-18], [14,-18],
  [-18,-10], [-10,-10], [-2,-10], [6,-10], [14,-10],
  [-18,-2], [-10,-2], [-2,-2], [6,-2], [14,-2],
  [-18,6], [-10,6], [-2,6], [6,6], [14,6],
  [-18,14], [-10,14], [-2,14], [6,14], [14,14]
];

const nodeGeo = new THREE.SphereGeometry(0.6, 16, 16);
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xd4af37,
  metalness: 0.9,
  roughness: 0.1,
  emissive: 0xd4af37,
  emissiveIntensity: 0.3
});

const activeGoldMat = new THREE.MeshStandardMaterial({
  color: 0xffee44,
  metalness: 0.9,
  roughness: 0.1,
  emissive: 0xffee44,
  emissiveIntensity: 0.8
});

nodePositions.forEach((pos, i) => {
  const node = new THREE.Mesh(nodeGeo, goldMat.clone());
  node.position.set(pos[0], 0, pos[1]);
  node.userData = { id: i, active: false, connections: [] };
  nodeGroup.add(node);
  nodes.push(node);
});

// === 线路连接 ===
const connections = [];
const lineGroup = new THREE.Group();
scene.add(lineGroup);

const connectionPairs = [
  [0,1], [1,2], [2,3], [3,4],
  [5,6], [6,7], [7,8], [8,9],
  [10,11], [11,12], [12,13], [13,14],
  [15,16], [16,17], [17,18], [18,19],
  [20,21], [21,22], [22,23], [23,24],
  [0,5], [5,10], [10,15], [15,20],
  [1,6], [6,11], [11,16], [16,21],
  [2,7], [7,12], [12,17], [17,22],
  [3,8], [8,13], [13,18], [18,23],
  [4,9], [9,14], [14,19], [19,24],
  [1,7], [2,8], [5,11], [6,12], [11,17], [12,18], [16,22], [17,23]
];

connectionPairs.forEach(pair => {
  const n1 = nodes[pair[0]];
  const n2 = nodes[pair[1]];
  n1.userData.connections.push(pair[1]);
  n2.userData.connections.push(pair[0]);
  
  const points = [n1.position.clone(), n2.position.clone()];
  const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x1a5a2a,
    transparent: true,
    opacity: 0.4
  });
  const line = new THREE.Line(lineGeo, lineMat);
  line.userData = { n1: pair[0], n2: pair[1], active: false };
  lineGroup.add(line);
  connections.push(line);
});

// === 数据包系统 ===
const packets = [];
const packetGroup = new THREE.Group();
scene.add(packetGroup);

function createPacket(startNode, endNode) {
  const packetGeo = new THREE.SphereGeometry(0.25, 8, 8);
  const packetMat = new THREE.MeshBasicMaterial({
    color: 0x33ff66,
    transparent: true,
    opacity: 0.9
  });
  const packet = new THREE.Mesh(packetGeo, packetMat);
  packet.position.copy(nodes[startNode].position);
  packet.userData = {
    start: startNode,
    end: endNode,
    progress: 0,
    speed: 0.02 + Math.random() * 0.02
  };
  packetGroup.add(packet);
  packets.push(packet);
}

// === 芯片组件 ===
const chips = [];
const chipGroup = new THREE.Group();
scene.add(chipGroup);

const chipPositions = [
  { x: -14, z: -14, w: 6, h: 6 },
  { x: 10, z: -14, w: 5, h: 5 },
  { x: -14, z: 10, w: 7, h: 5 },
  { x: 10, z: 10, w: 5, h: 7 }
];

chipPositions.forEach((cp, i) => {
  const chipGeo = new THREE.BoxGeometry(cp.w, 0.8, cp.h);
  const chipMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a1a,
    metalness: 0.5,
    roughness: 0.4
  });
  const chip = new THREE.Mesh(chipGeo, chipMat);
  chip.position.set(cp.x, 0, cp.z);
  chipGroup.add(chip);
  
  // 芯片上的金色引脚
  for (let j = 0; j < 8; j++) {
    const pinGeo = new THREE.BoxGeometry(0.2, 0.3, 0.8);
    const pinMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.1 });
    const pin = new THREE.Mesh(pinGeo, pinMat);
    pin.position.set(
      cp.x - cp.w/2 + (j + 0.5) * cp.w/8,
      0.2,
      cp.z - cp.h/2 - 0.4
    );
    chipGroup.add(pin);
  }
});

// === 粒子系统（微小电子）===
const dustCount = 200;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i*3] = (Math.random() - 0.5) * 50;
  dustPos[i*3+1] = Math.random() * 5;
  dustPos[i*3+2] = (Math.random() - 0.5) * 50;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0x33ff66,
  size: 0.1,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// === 交互 ===
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('click', () => {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodes);
  
  if (intersects.length > 0) {
    const node = intersects[0].object;
    node.userData.active = !node.userData.active;
    node.material = node.userData.active ? activeGoldMat.clone() : goldMat.clone();
    
    // 发送数据包到连接的节点
    node.userData.connections.forEach(connId => {
      if (Math.random() > 0.3) {
        createPacket(node.userData.id, connId);
      }
    });
    
    // 激活连接线
    connections.forEach(line => {
      if (line.userData.n1 === node.userData.id || line.userData.n2 === node.userData.id) {
        line.material.color.setHex(0x33ff66);
        line.material.opacity = 0.8;
        line.userData.active = true;
        setTimeout(() => {
          line.material.color.setHex(0x1a5a2a);
          line.material.opacity = 0.4;
          line.userData.active = false;
        }, 1000);
      }
    });
  }
});

// === 动画 ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // 节点脉动
  nodes.forEach((node, i) => {
    const scale = 1 + Math.sin(time * 2 + i * 0.5) * 0.1;
    node.scale.setScalar(scale);
    if (node.userData.active) {
      node.material.emissiveIntensity = 0.5 + Math.sin(time * 5) * 0.3;
    }
  });

  // 数据包移动
  for (let i = packets.length - 1; i >= 0; i--) {
    const packet = packets[i];
    packet.userData.progress += packet.userData.speed;
    const start = nodes[packet.userData.start].position;
    const end = nodes[packet.userData.end].position;
    packet.position.lerpVectors(start, end, packet.userData.progress);
    
    if (packet.userData.progress >= 1) {
      packetGroup.remove(packet);
      packets.splice(i, 1);
      // 到达后可能继续传播
      const targetNode = nodes[packet.userData.end];
      if (targetNode.userData.connections.length > 0 && Math.random() > 0.5) {
        const nextNode = targetNode.userData.connections[Math.floor(Math.random() * targetNode.userData.connections.length)];
        createPacket(packet.userData.end, nextNode);
      }
    }
  }

  // 电子粒子
  const dPos = dust.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    dPos[i*3+1] += Math.sin(time + i) * 0.01;
    if (dPos[i*3+1] > 5) dPos[i*3+1] = 0;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  // 相机缓慢环绕
  camera.position.x = Math.sin(time * 0.1) * 5;
  camera.position.z = 25 + Math.cos(time * 0.1) * 5;
  camera.lookAt(0, 0, 0);

  // 更新UI
  document.getElementById('node-count').textContent = nodes.length;
  document.getElementById('packet-count').textContent = packets.length;
  document.getElementById('freq').textContent = (2.4 + Math.sin(time) * 0.2).toFixed(2);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
