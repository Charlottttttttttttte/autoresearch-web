<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哥特式光影教堂 — 神圣之光</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050508;
  overflow: hidden;
  font-family: 'Cinzel', serif;
  color: #e0d5c5;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
.overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.title {
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.title h1 {
  font-size: 3rem;
  font-weight: 400;
  letter-spacing: 0.4em;
  color: rgba(224,213,197,0.9);
  text-shadow: 0 0 60px rgba(212,175,55,0.2);
  opacity: 0;
  animation: divineReveal 2s ease 1s forwards;
}
.title .subtitle {
  font-size: 0.9rem;
  color: rgba(224,213,197,0.35);
  margin-top: 16px;
  letter-spacing: 0.5em;
  opacity: 0;
  animation: divineReveal 2s ease 1.8s forwards;
}
@keyframes divineReveal {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.info {
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.info span {
  display: block;
  font-size: 0.75rem;
  color: rgba(224,213,197,0.2);
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}
.cross {
  position: fixed;
  top: 8%;
  right: 8%;
  width: 30px;
  height: 40px;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  animation: divineReveal 2s ease 2.5s forwards;
}
.cross::before, .cross::after {
  content: '';
  position: absolute;
  background: rgba(212,175,55,0.3);
}
.cross::before {
  width: 2px; height: 100%;
  left: 50%; transform: translateX(-50%);
}
.cross::after {
  width: 60%; height: 2px;
  top: 30%; left: 20%;
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="cross"></div>
<div class="overlay title">
  <h1>LUX AETERNA</h1>
  <div class="subtitle">永恒之光</div>
</div>
<div class="overlay info">
  <span>移动鼠标改变光束角度</span>
  <span>点击召唤神圣光辉</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === 哥特式光影教堂 Three.js 场景 ===
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050508, 0.008);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x050508, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// === 光源系统 ===
const ambientLight = new THREE.AmbientLight(0x1a1530, 0.3);
scene.add(ambientLight);

// 主光束（从窗户射入）
const sunLight = new THREE.DirectionalLight(0xffddaa, 0.8);
sunLight.position.set(10, 20, 10);
scene.add(sunLight);

// 彩色玻璃窗光源
const stainedColors = [0xff3333, 0xff8800, 0xffdd00, 0x33ff66, 0x3388ff, 0x8833ff];
const windowLights = [];
for (let i = 0; i < 6; i++) {
  const light = new THREE.PointLight(stainedColors[i], 0.4, 40);
  light.position.set(-15 + i * 6, 8, -5);
  scene.add(light);
  windowLights.push(light);
}

// 地面反射光
const groundLight = new THREE.PointLight(0xffddaa, 0.3, 30);
groundLight.position.set(0, -5, 5);
scene.add(groundLight);

// === 哥特式建筑结构 ===
const cathedralGroup = new THREE.Group();
scene.add(cathedralGroup);

// 地面
const floorGeometry = new THREE.PlaneGeometry(60, 80, 20, 20);
const floorMaterial = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  metalness: 0.1,
  roughness: 0.9,
  transparent: true,
  opacity: 0.8
});
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -8;
cathedralGroup.add(floor);

// 柱子
function createColumn(x, z, height) {
  const geometry = new THREE.CylinderGeometry(0.6, 0.8, height, 8);
  const material = new THREE.MeshStandardMaterial({
    color: 0x2a2538,
    metalness: 0.3,
    roughness: 0.7
  });
  const column = new THREE.Mesh(geometry, material);
  column.position.set(x, -8 + height/2, z);
  
  // 柱头装饰
  const capGeometry = new THREE.ConeGeometry(1.0, 1.5, 8);
  const cap = new THREE.Mesh(capGeometry, material);
  cap.position.set(x, -8 + height + 0.75, z);
  cathedralGroup.add(cap);
  
  return column;
}

for (let i = -2; i <= 2; i++) {
  cathedralGroup.add(createColumn(i * 8, -10, 18));
  cathedralGroup.add(createColumn(i * 8, 5, 18));
}

// 尖拱结构
function createArch(x, z, width, height) {
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-width/2, 0, 0),
    new THREE.Vector3(-width/3, height * 0.7, 0),
    new THREE.Vector3(0, height, 0),
    new THREE.Vector3(width/3, height * 0.7, 0),
    new THREE.Vector3(width/2, 0, 0)
  ]);
  const geometry = new THREE.TubeGeometry(curve, 20, 0.4, 6, false);
  const material = new THREE.MeshStandardMaterial({
    color: 0x3a3548,
    metalness: 0.4,
    roughness: 0.6
  });
  const arch = new THREE.Mesh(geometry, material);
  arch.position.set(x, 10, z);
  return arch;
}

for (let i = -2; i < 2; i++) {
  cathedralGroup.add(createArch(i * 8 + 4, -10, 8, 6));
  cathedralGroup.add(createArch(i * 8 + 4, 5, 8, 6));
}

// === 彩色玻璃窗 ===
function createStainedGlass(x, y, z, color, size) {
  const group = new THREE.Group();
  
  // 窗框（圆形玫瑰窗风格）
  const frameGeometry = new THREE.RingGeometry(size * 0.9, size, 16);
  const frameMaterial = new THREE.MeshStandardMaterial({
    color: 0x4a4560,
    metalness: 0.5,
    roughness: 0.5,
    side: THREE.DoubleSide
  });
  const frame = new THREE.Mesh(frameGeometry, frameMaterial);
  group.add(frame);
  
  // 彩色玻璃
  const glassGeometry = new THREE.CircleGeometry(size * 0.85, 16);
  const glassMaterial = new THREE.MeshStandardMaterial({
    color: color,
    transparent: true,
    opacity: 0.5,
    emissive: color,
    emissiveIntensity: 0.3,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  });
  const glass = new THREE.Mesh(glassGeometry, glassMaterial);
  group.add(glass);
  
  // 窗格线条
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2;
    const lineGeometry = new THREE.BoxGeometry(0.05, size, 0.05);
    const line = new THREE.Mesh(lineGeometry, frameMaterial);
    line.position.x = Math.cos(angle) * size * 0.4;
    line.position.y = Math.sin(angle) * size * 0.4;
    line.rotation.z = angle;
    group.add(line);
  }
  
  group.position.set(x, y, z);
  return group;
}

const glassPositions = [
  { x: -12, y: 5, color: 0xff3333, size: 2.5 },
  { x: -6, y: 6, color: 0xff8800, size: 2 },
  { x: 0, y: 7, color: 0xffdd00, size: 3 },
  { x: 6, y: 6, color: 0x33ff66, size: 2 },
  { x: 12, y: 5, color: 0x3388ff, size: 2.5 }
];

glassPositions.forEach(gp => {
  cathedralGroup.add(createStainedGlass(gp.x, gp.y, -12, gp.color, gp.size));
});

// === 光束粒子系统（God Rays）===
const rayCount = 300;
const rayGeometry = new THREE.BufferGeometry();
const rayPositions = new Float32Array(rayCount * 3);
const rayColors = new Float32Array(rayCount * 3);

for (let i = 0; i < rayCount; i++) {
  const windowIdx = Math.floor(Math.random() * glassPositions.length);
  const gp = glassPositions[windowIdx];
  rayPositions[i*3] = gp.x + (Math.random() - 0.5) * 2;
  rayPositions[i*3+1] = gp.y - Math.random() * 15;
  rayPositions[i*3+2] = gp.z + Math.random() * 20;
  
  const color = new THREE.Color(gp.color);
  rayColors[i*3] = color.r;
  rayColors[i*3+1] = color.g;
  rayColors[i*3+2] = color.b;
}

rayGeometry.setAttribute('position', new THREE.BufferAttribute(rayPositions, 3));
rayGeometry.setAttribute('color', new THREE.BufferAttribute(rayColors, 3));

const rayMaterial = new THREE.PointsMaterial({
  size: 0.3,
  vertexColors: true,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true
});

const godRays = new THREE.Points(rayGeometry, rayMaterial);
scene.add(godRays);

// === 飘浮尘埃粒子 ===
const dustCount = 200;
const dustGeometry = new THREE.BufferGeometry();
const dustPositions = new Float32Array(dustCount * 3);

for (let i = 0; i < dustCount; i++) {
  dustPositions[i*3] = (Math.random() - 0.5) * 40;
  dustPositions[i*3+1] = -8 + Math.random() * 20;
  dustPositions[i*3+2] = (Math.random() - 0.5) * 30;
}

dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));

const dustMaterial = new THREE.PointsMaterial({
  color: 0xffddaa,
  size: 0.15,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending
});

const dust = new THREE.Points(dustGeometry, dustMaterial);
scene.add(dust);

// === 鼠标交互 ===
const mouse = new THREE.Vector2();
let isPraying = false;
let prayTime = 0;

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('click', () => {
  isPraying = true;
  prayTime = 0;
});

// === 动画 ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  // 彩色玻璃窗脉动
  windowLights.forEach((light, i) => {
    light.intensity = 0.3 + Math.sin(time * 0.5 + i * 1.2) * 0.2;
  });

  // 光束飘落
  const rPos = godRays.geometry.attributes.position.array;
  for (let i = 0; i < rayCount; i++) {
    rPos[i*3+1] -= 0.02;
    rPos[i*3] += Math.sin(time + i * 0.1) * 0.005;
    if (rPos[i*3+1] < -8) {
      const windowIdx = Math.floor(Math.random() * glassPositions.length);
      const gp = glassPositions[windowIdx];
      rPos[i*3] = gp.x + (Math.random() - 0.5) * 2;
      rPos[i*3+1] = gp.y;
      rPos[i*3+2] = gp.z;
    }
  }
  godRays.geometry.attributes.position.needsUpdate = true;

  // 尘埃漂浮
  const dPos = dust.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    dPos[i*3+1] += Math.sin(time * 0.3 + i * 0.05) * 0.003;
    dPos[i*3] += Math.cos(time * 0.2 + i * 0.03) * 0.002;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  // 相机缓慢移动
  camera.position.x = Math.sin(time * 0.1) * 3;
  camera.position.y = 2 + Math.sin(time * 0.15) * 1;
  camera.lookAt(0, 2, 0);

  // 鼠标影响光源角度
  sunLight.position.x = 10 + mouse.x * 5;
  sunLight.position.y = 20 + mouse.y * 5;

  // 祈祷效果
  if (isPraying) {
    prayTime += delta;
    const prayFactor = Math.sin(prayTime * 2) * 0.5 + 0.5;
    sunLight.intensity = 0.8 + prayFactor * 1.5;
    godRays.material.opacity = 0.4 + prayFactor * 0.4;
    godRays.material.size = 0.3 + prayFactor * 0.5;
    windowLights.forEach(l => { l.intensity = 0.5 + prayFactor; });
    if (prayTime > 3) isPraying = false;
  } else {
    sunLight.intensity = 0.8 + Math.sin(time * 0.3) * 0.1;
    godRays.material.opacity = 0.4;
    godRays.material.size = 0.3;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
